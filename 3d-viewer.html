<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yphone — Wearable Holographic Projector</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--cyan:#00d4ff;--amber:#ff9500;--green:#44ddaa;--white:#e8f0f8}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Mono',monospace;
    background:#000;overflow:hidden;height:100vh;
    -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;
    cursor:grab;
  }
  body:active{cursor:grabbing}
  canvas{display:block}

  /* Top bar */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:10;
    padding:18px 26px;display:flex;justify-content:space-between;align-items:center;
    pointer-events:none;
  }
  .topbar>*{pointer-events:auto}
  .brand{font-size:18px;font-weight:600;color:var(--white);letter-spacing:-0.01em}
  .brand em{font-style:normal;color:var(--cyan)}
  .tag{
    font-size:10px;letter-spacing:0.12em;color:var(--green);
    border:1px solid rgba(68,221,170,0.2);border-radius:20px;
    padding:6px 14px;background:rgba(68,221,170,0.04);
  }

  /* Bottom controls */
  .ctrls{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;gap:6px;background:rgba(10,10,14,0.88);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-radius:22px;padding:6px 8px;border:1px solid rgba(255,255,255,0.06);
  }
  .ctrl{
    padding:8px 15px;border-radius:16px;border:1px solid transparent;
    background:transparent;color:#8899aa;font-size:11px;font-weight:500;
    cursor:pointer;transition:all 0.25s ease;font-family:inherit;
    letter-spacing:0.03em;white-space:nowrap;
  }
  .ctrl:hover{color:#fff;background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.12)}
  .ctrl.on{background:rgba(0,212,255,0.1);color:var(--cyan);border-color:rgba(0,212,255,0.25)}
  .ctrl.icon{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%}

  /* Hint */
  .hint{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:10;
    font-size:11px;color:rgba(136,153,170,0.45);letter-spacing:0.06em;
    pointer-events:none;transition:opacity 0.8s ease;
  }

  /* Info tooltip */
  .tooltip{
    position:fixed;z-index:20;pointer-events:none;
    background:rgba(10,15,25,0.92);border:1px solid rgba(0,200,240,0.2);
    border-radius:10px;padding:10px 14px;color:var(--white);
    font-size:11px;opacity:0;transition:opacity 0.2s ease;
    transform:translate(-50%,-130%);
  }
  .tooltip.show{opacity:1}
  .tooltip .tt-name{font-weight:600;color:var(--cyan);margin-bottom:3px}
  .tooltip .tt-detail{color:#8899aa;font-size:10px}

  /* Loading */
  .load{
    position:fixed;inset:0;z-index:100;background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;transition:opacity 0.5s ease;
  }
  .load.done{opacity:0;pointer-events:none}
  .load-ring{width:36px;height:36px;border:1.5px solid rgba(0,212,255,0.12);
    border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .load span{font-size:10px;letter-spacing:0.14em;color:#446677}

  @media(max-width:600px){
    .ctrls{gap:2px;padding:4px 5px}
    .ctrl{padding:6px 10px;font-size:10px}
    .ctrl.icon{width:28px;height:28px}
    .topbar{padding:12px 16px}
    .brand{font-size:15px}
  }
</style>
</head>
<body>

<div class="load" id="load"><div class="load-ring"></div><span>YPHONE PROJECTOR · INITIALIZING</span></div>

<div class="topbar">
  <div class="brand">YPHONE<em>·</em>PUCK</div>
  <div class="tag">● LIVE PROJECTION</div>
</div>

<div class="hint" id="hint">DRAG TO ORBIT &nbsp;·&nbsp; SCROLL TO ZOOM &nbsp;·&nbsp; HOVER THE PUCK &nbsp;·&nbsp; CLICK PANELS</div>

<div class="tooltip" id="tooltip"><div class="tt-name"></div><div class="tt-detail"></div></div>

<div class="ctrls">
  <button class="ctrl on" id="btnOrbit" onclick="t('orbit')">⟳ ORBIT</button>
  <button class="ctrl on" id="btnProject" onclick="t('project')">☲ PROJECTION</button>
  <button class="ctrl" id="btnPanels" onclick="t('panels')">⊞ DATA</button>
  <button class="ctrl icon" onclick="resetAll()">↺</button>
  <button class="ctrl icon" onclick="shot()">◎</button>
</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ========== SCENE ==========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0e);
scene.fog = new THREE.Fog(0x0a0a0e, 4, 22);

const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.3, 50);
camera.position.set(2.8, 3.5, 5.5);
camera.lookAt(0, 1.5, 0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

// Controls
const ctrl3d = new OrbitControls(camera,renderer.domElement);
ctrl3d.enableDamping=true;ctrl3d.dampingFactor=0.07;
ctrl3d.autoRotate=true;ctrl3d.autoRotateSpeed=0.3;
ctrl3d.minDistance=2;ctrl3d.maxDistance=12;
ctrl3d.maxPolarAngle=Math.PI*0.65;
ctrl3d.target.set(0,1.6,0);ctrl3d.update();

// ========== LIGHTING (warm room + cool hologram) ==========
// Warm desk lamp (key)
const keyLight = new THREE.DirectionalLight(0xffeedd, 3.5);
keyLight.position.set(3,6,4);
keyLight.castShadow=true;
keyLight.shadow.mapSize.width=2048;keyLight.shadow.mapSize.height=2048;
keyLight.shadow.camera.near=0.3;keyLight.shadow.camera.far=30;
keyLight.shadow.camera.left=-6;keyLight.shadow.camera.right=6;
keyLight.shadow.camera.top=6;keyLight.shadow.camera.bottom=-3;
keyLight.shadow.bias=-0.0003;
scene.add(keyLight);

// Cool hologram fill
const holoLight = new THREE.PointLight(0x44aacc, 12, 5, 1.5);
holoLight.position.set(0,2.5,0);
scene.add(holoLight);

// Rim
const rimLight = new THREE.DirectionalLight(0x334466, 1.2);
rimLight.position.set(-3,2,-4);
scene.add(rimLight);

// Ambient
scene.add(new THREE.AmbientLight(0x1a1a28,0.5));

// ========== DESK ==========
// Main desk surface
const deskGeo = new THREE.BoxGeometry(8,0.15,6);
const deskMat = new THREE.MeshStandardMaterial({
  color:0x1a1818,roughness:0.35,metalness:0.05
});
const desk = new THREE.Mesh(deskGeo,deskMat);
desk.position.y=-0.075;desk.receiveShadow=true;desk.castShadow=true;
scene.add(desk);

// Desk edge bevel highlight
const deskEdgeGeo = new THREE.BoxGeometry(8.02,0.02,6.02);
const deskEdge = new THREE.Mesh(deskEdgeGeo,
  new THREE.MeshStandardMaterial({color:0x2a2626,roughness:0.3,metalness:0.1})
);
deskEdge.position.y=0;scene.add(deskEdge);

// Subtle desk surface detail (leather pad)
const padGeo = new THREE.BoxGeometry(2.2,0.005,1.6);
const padMat = new THREE.MeshStandardMaterial({color:0x181818,roughness:0.6,metalness:0.02});
const pad = new THREE.Mesh(padGeo,padMat);
pad.position.set(-0.5,0.078,0.3);pad.receiveShadow=true;scene.add(pad);

// ========== COFFEE CUP (for scale) ==========
const mugGroup = new THREE.Group();
mugGroup.position.set(2.2,0.08,1.2);

// Mug body
const mugBodyGeo = new THREE.CylinderGeometry(0.18,0.17,0.4,32,1,true);
const mugBody = new THREE.Mesh(mugBodyGeo,
  new THREE.MeshStandardMaterial({color:0xe8e0d8,roughness:0.25,metalness:0.05,side:THREE.DoubleSide})
);
mugBody.position.y=0.2;mugBody.castShadow=true;
mugGroup.add(mugBody);

// Mug bottom
const mugBottomGeo = new THREE.CylinderGeometry(0.155,0.17,0.03,32);
const mugBottom = new THREE.Mesh(mugBottomGeo,
  new THREE.MeshStandardMaterial({color:0xd8d0c8,roughness:0.3,metalness:0.05})
);
mugBottom.position.y=0.015;mugGroup.add(mugBottom);

// Mug handle
const handleGeo = new THREE.TorusGeometry(0.12,0.03,8,16,Math.PI);
const handle = new THREE.Mesh(handleGeo,
  new THREE.MeshStandardMaterial({color:0xe8e0d8,roughness:0.25,metalness:0.05})
);
handle.position.set(0.18,0.22,0);handle.rotation.z=Math.PI/2;handle.rotation.y=Math.PI/2;
mugGroup.add(handle);

scene.add(mugGroup);

// ========== YPHONE PUCK (THE PRODUCT) ==========
const puckGroup = new THREE.Group();
puckGroup.position.set(0,0.08,0);
scene.add(puckGroup);

// Main body (titanium cylinder)
const puckBodyGeo = new THREE.CylinderGeometry(0.28,0.29,0.09,64);
const puckBodyMat = new THREE.MeshStandardMaterial({
  color:0xc8c4bc,roughness:0.28,metalness:0.85
});
const puckBody = new THREE.Mesh(puckBodyGeo,puckBodyMat);
puckBody.position.y=0.045;puckBody.castShadow=true;puckBody.receiveShadow=true;
puckGroup.add(puckBody);

// Bottom ring (magnetic attachment)
const magRingGeo = new THREE.TorusGeometry(0.26,0.015,16,64);
const magRing = new THREE.Mesh(magRingGeo,
  new THREE.MeshStandardMaterial({color:0x888480,roughness:0.3,metalness:0.9})
);
magRing.rotation.x=Math.PI/2;magRing.position.y=0.005;
puckGroup.add(magRing);

// Top glass surface (the projector lens)
const topGlassGeo = new THREE.CylinderGeometry(0.26,0.27,0.015,64);
const topGlassMat = new THREE.MeshPhysicalMaterial({
  color:0x0a0a10,roughness:0.05,metalness:0.02,
  clearcoat:0.4,clearcoatRoughness:0.05,
  emissive:0x001122,emissiveIntensity:0.3
});
const topGlass = new THREE.Mesh(topGlassGeo,topGlassMat);
topGlass.position.y=0.09;topGlass.receiveShadow=true;
puckGroup.add(topGlass);

// Lens rings (concentric circles on top)
for(let i=0;i<3;i++){
  const ringGeo = new THREE.TorusGeometry(0.12+i*0.06,0.006,8,80);
  const ring = new THREE.Mesh(ringGeo,
    new THREE.MeshBasicMaterial({color:i===0?0x88ccff:0x336688,transparent:true,opacity:0.5-i*0.12,depthWrite:false})
  );
  ring.rotation.x=-Math.PI/2;ring.position.y=0.098;
  puckGroup.add(ring);
}

// Center lens dot
const lensDotGeo = new THREE.SphereGeometry(0.04,16,16);
const lensDotMat = new THREE.MeshBasicMaterial({color:0x88ddff,transparent:true,opacity:0.8,depthWrite:false});
const lensDot = new THREE.Mesh(lensDotGeo,lensDotMat);
lensDot.position.y=0.099;puckGroup.add(lensDot);

// Puck edge LED indicator
const ledGeo = new THREE.TorusGeometry(0.275,0.004,8,120);
const ledMat = new THREE.MeshBasicMaterial({color:0x44ddaa,transparent:true,opacity:0.7,depthWrite:false});
const ledRing = new THREE.Mesh(ledGeo,ledMat);
ledRing.rotation.x=Math.PI/2;ledRing.position.y=0.045;
puckGroup.add(ledRing);

// ========== PROJECTION BEAM ==========
const beamGroup = new THREE.Group();
beamGroup.position.set(0,0.1,0);
puckGroup.add(beamGroup);

// Inner beam cone
const coneGeo = new THREE.CylinderGeometry(0.02,0.24,2.8,32,1,true);
const coneMat = new THREE.MeshBasicMaterial({
  color:0x4488bb,transparent:true,opacity:0.04,depthWrite:false,side:THREE.DoubleSide
});
const cone = new THREE.Mesh(coneGeo,coneMat);
cone.position.y=1.4;beamGroup.add(cone);

// Beam edge lines (4)
for(let i=0;i<4;i++){
  const a=(i/4)*Math.PI*2;
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(Math.cos(a)*0.06,0,Math.sin(a)*0.06),
    new THREE.Vector3(Math.cos(a)*0.6,2.8,Math.sin(a)*0.6)
  ]);
  const line = new THREE.Line(lineGeo,
    new THREE.LineBasicMaterial({color:0x3388aa,transparent:true,opacity:0.15,depthWrite:false})
  );
  beamGroup.add(line);
}

// Rising particles inside beam
const beamPartCount=200;
const beamPartGeo=new THREE.BufferGeometry();
const beamPartPos=new Float32Array(beamPartCount*3);
const beamPartData=[];
for(let i=0;i<beamPartCount;i++){
  const a=Math.random()*Math.PI*2;
  const h=Math.random()*2.8;
  const r=0.04+h*0.2;
  beamPartPos[i*3]=Math.cos(a)*r;
  beamPartPos[i*3+1]=h;
  beamPartPos[i*3+2]=Math.sin(a)*r;
  beamPartData.push({a,r,h,speed:0.3+Math.random()*0.7,baseR:r,baseH:h});
}
beamPartGeo.setAttribute('position',new THREE.BufferAttribute(beamPartPos,3));
const beamPts=new THREE.Points(beamPartGeo,
  new THREE.PointsMaterial({color:0x55bbee,size:0.012,transparent:true,opacity:0.6,depthWrite:false,blending:THREE.AdditiveBlending})
);
beamGroup.add(beamPts);

// ========== HOLOGRAPHIC CONTENT (above the puck) ==========
const holoRoot = new THREE.Group();
holoRoot.position.set(0,1.8,0);
scene.add(holoRoot);

// -- Central AI Core (3D geometric) --
const aiGroup = new THREE.Group();
holoRoot.add(aiGroup);

// Outer wireframe icosahedron
const aiOuterGeo = new THREE.IcosahedronGeometry(0.55,2);
const aiOuterWire = new THREE.LineSegments(
  new THREE.EdgesGeometry(aiOuterGeo),
  new THREE.LineBasicMaterial({color:0x44bbdd,transparent:true,opacity:0.55,depthWrite:false})
);
aiGroup.add(aiOuterWire);

// Inner icosahedron
const aiInnerGeo = new THREE.IcosahedronGeometry(0.3,2);
const aiInnerWire = new THREE.LineSegments(
  new THREE.EdgesGeometry(aiInnerGeo),
  new THREE.LineBasicMaterial({color:0x77ddff,transparent:true,opacity:0.65,depthWrite:false})
);
aiGroup.add(aiInnerWire);

// Solid core
const aiSolidGeo = new THREE.SphereGeometry(0.12,32,32);
const aiSolidMat = new THREE.MeshBasicMaterial({color:0x88eeff,transparent:true,opacity:0.7,depthWrite:false});
const aiSolid = new THREE.Mesh(aiSolidGeo,aiSolidMat);
aiGroup.add(aiSolid);

// AI halo
const aiHaloGeo = new THREE.SphereGeometry(0.22,32,32);
const aiHaloMat = new THREE.MeshBasicMaterial({color:0x3399cc,transparent:true,opacity:0.1,depthWrite:false});
const aiHalo = new THREE.Mesh(aiHaloGeo,aiHaloMat);
aiGroup.add(aiHalo);

// AI rings
const aiRing1Geo = new THREE.TorusGeometry(0.28,0.008,16,64);
const aiRing1 = new THREE.Mesh(aiRing1Geo,
  new THREE.MeshBasicMaterial({color:0x55ccff,transparent:true,opacity:0.55,depthWrite:false})
);
aiGroup.add(aiRing1);

const aiRing2Geo = new THREE.TorusGeometry(0.32,0.006,16,64);
const aiRing2 = new THREE.Mesh(aiRing2Geo,
  new THREE.MeshBasicMaterial({color:0x3399cc,transparent:true,opacity:0.45,depthWrite:false})
);
aiRing2.rotation.x=Math.PI/2;
aiGroup.add(aiRing2);

// AI orbiting dots
const aiDotCount=30;
const aiDots=[];
for(let i=0;i<aiDotCount;i++){
  const dot=new THREE.Mesh(
    new THREE.SphereGeometry(0.025,6,6),
    new THREE.MeshBasicMaterial({color:0x88eeff,transparent:true,opacity:0.8,depthWrite:false})
  );
  const a=(i/aiDotCount)*Math.PI*2;
  const r=0.38+Math.random()*0.15;
  dot.position.set(Math.cos(a)*r,Math.sin(a)*r*0.5,Math.sin(a)*r*0.5);
  dot.userData={a,r,sp:0.5+Math.random()*0.8,oy:Math.random()*Math.PI*2};
  aiGroup.add(dot);
  aiDots.push(dot);
}

// AI point light
const aiPointLight = new THREE.PointLight(0x55bbee,6,3,2);
aiGroup.add(aiPointLight);

// ========== FLOATING DATA PANELS (in arc behind AI core) ==========
function makePanelTex(title,lines,w=480,h=260){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.fillStyle='rgba(5,10,22,0.9)';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,170,210,0.4)';ctx.lineWidth=1;ctx.strokeRect(3,3,w-6,h-6);
  // Corner accents
  const cs=14;
  ctx.strokeStyle='rgba(0,212,255,0.65)';ctx.lineWidth=1.5;
  [[3,3+cs,3,3,3+cs,3],[w-3-cs,3,w-3,3,w-3,3+cs],[3,h-3-cs,3,h-3,3+cs,h-3],[w-3-cs,h-3,w-3,h-3,w-3,h-3-cs]]
    .forEach(([x1,y1,x2,y2,x3,y3])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.stroke()});
  ctx.fillStyle='#00d4ff';ctx.font='600 12px "SF Mono",monospace';ctx.fillText(title,16,32);
  ctx.strokeStyle='rgba(0,150,200,0.2)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(16,40);ctx.lineTo(w-16,40);ctx.stroke();
  ctx.font='10px "SF Mono",monospace';
  lines.forEach((l,i)=>{
    if(l[0]==='>')ctx.fillStyle='#00d4ff';
    else if(l[0]==='✓')ctx.fillStyle='#44ddaa';
    else if(l[0]==='!')ctx.fillStyle='#ff9500';
    else ctx.fillStyle='#8899bb';
    ctx.fillText(l,16,58+i*17);
  });
  const t=new THREE.CanvasTexture(c);t.minFilter=THREE.LinearFilter;return t;
}

const panelDefs=[
  {p:[0,0.75,-1.8],r:[0.35,0,0],t:'SYSTEM STATUS',l:['> Yphone OS v4.2.7','> Uptime: 847 days','✓ AI Core: OPTIMAL','✓ All Modules: NOMINAL','  Active Processes: 14','  Power Draw: 3.2W']},
  {p:[1.8,0.4,-1.3],r:[0.2,-0.5,0.05],t:'MODULE HEALTH',l:['> CPU Gen 8  : ██████ 98%','> GPU Gen 7  : █████░ 91%','> AI NPU v2.1: ██████ 100%','> Battery    : ████░░ 82%','✓ Predicted Life: 12.4 yr','  Next Refresh: 2027-Q2']},
  {p:[2.0,-0.3,-1.5],r:[0.25,-0.55,-0.05],t:'E-WASTE PREVENTION',l:['> Device Lifetime: 4.2 yr','> Prevented Waste: 18.7 kg','> CO₂ Avoided: 142 kg','✓ Modules Recycled: 6','✓ Circular Index: 94%','> Path to Zero: ON TRACK']},
  {p:[-1.8,0.4,-1.3],r:[0.2,0.5,-0.05],t:'CPU PERFORMANCE',l:['> Gen 8 Hexa-Core','> Clock: 3.8 GHz Base','✓ Temp: 42°C NORMAL','  Load: 23% Average','  IPC Gain: +17%','! Pred. Refresh: 2029']},
  {p:[-2.0,-0.3,-1.5],r:[0.25,0.55,0.05],t:'GPU ANALYTICS',l:['> Gen 7 Octa-Core','> VRAM: 16 TB Unified','✓ Throughput: OPTIMAL','  RT Perf: +22% YoY','  Power Eff: 94%','✓ Driver: LATEST']},
  {p:[0,-0.5,-2.2],r:[0.4,0,0],t:'LIVE UPDATE FEED',l:['> [14:32] GPU Optimizer v3','✓ [14:28] Security Patch','> [14:15] Battery Profile','✓ [13:58] AI Model Sync','  [13:42] Sensor Calib.','  [13:30] Network Stack']},
];
const panels=[];
panelDefs.forEach(d=>{
  const tex=makePanelTex(d.t,d.l);
  const geo=new THREE.PlaneGeometry(1.5,0.75);
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide});
  const panel=new THREE.Mesh(geo,mat);
  panel.position.set(...d.p);panel.rotation.set(...d.r);
  panel.userData=d;holoRoot.add(panel);panels.push(panel);
});

// Connection lines (from AI core to each panel)
panels.forEach(p=>{
  const pts=[new THREE.Vector3(0,0,0),p.position.clone()];
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const line=new THREE.Line(geo,
    new THREE.LineBasicMaterial({color:0x114455,transparent:true,opacity:0.2,depthWrite:false})
  );
  holoRoot.add(line);
});

// Light beam from core down to puck
const downBeamGeo = new THREE.CylinderGeometry(0.01,0.05,1.8,8,1,true);
const downBeam = new THREE.Mesh(downBeamGeo,
  new THREE.MeshBasicMaterial({color:0x3388bb,transparent:true,opacity:0.06,depthWrite:false})
);
downBeam.position.y=-0.9;holoRoot.add(downBeam);

// ========== AMBIENT PARTICLES (subtle, around hologram) ==========
const ambCount=120;
const ambGeo=new THREE.BufferGeometry();
const ambPos=new Float32Array(ambCount*3);
for(let i=0;i<ambCount;i++){
  ambPos[i*3]=(Math.random()-0.5)*5;
  ambPos[i*3+1]=Math.random()*3.5-0.5;
  ambPos[i*3+2]=(Math.random()-0.5)*4;
}
ambGeo.setAttribute('position',new THREE.BufferAttribute(ambPos,3));
const ambPts=new THREE.Points(ambGeo,
  new THREE.PointsMaterial({color:0x4488aa,size:0.015,transparent:true,opacity:0.35,depthWrite:false,blending:THREE.AdditiveBlending})
);
holoRoot.add(ambPts);

// ========== INTERACTION ==========
const raycaster=new THREE.Raycaster();raycaster.far=8;
const mouse=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');

renderer.domElement.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObject(puckGroup,true);
  if(hits.length>0){
    tooltip.classList.add('show');
    tooltip.style.left=e.clientX+'px';
    tooltip.style.top=e.clientY+'px';
    tooltip.querySelector('.tt-name').textContent='Yphone Puck';
    tooltip.querySelector('.tt-detail').textContent='Wearable Holographic Projector · Click & hold to drag';
    document.body.style.cursor='pointer';
  }else{
    tooltip.classList.remove('show');
    document.body.style.cursor='grab';
    document.body.style.cursor=document.body.style.cursor==='grab'?'':'grab';
  }
});

// Click panels to highlight
renderer.domElement.addEventListener('click',e=>{
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(panels);
  if(hits.length>0){
    const panel=hits[0].object;
    // Brief flash highlight
    const orig=panel.material.opacity;
    panel.material.opacity=0.6;
    setTimeout(()=>{panel.material.opacity=orig;},300);
  }
});

// ========== STATE ==========
let projectionOn=true,panelsOn=true;

function t(what){
  if(what==='orbit'){ctrl3d.autoRotate=!ctrl3d.autoRotate;document.getElementById('btnOrbit').classList.toggle('on',ctrl3d.autoRotate)}
  if(what==='project'){projectionOn=!projectionOn;document.getElementById('btnProject').classList.toggle('on',projectionOn)}
  if(what==='panels'){panelsOn=!panelsOn;document.getElementById('btnPanels').classList.toggle('on',panelsOn)}
}
window.t=t;

window.resetAll=function(){
  const sp=camera.position.clone(),ep=new THREE.Vector3(2.8,3.5,5.5);
  const st=ctrl3d.target.clone(),et=new THREE.Vector3(0,1.6,0);
  const s=performance.now();
  (function anim(n){
    const p=Math.min((n-s)/800,1),e=1-Math.pow(1-p,3);
    camera.position.lerpVectors(sp,ep,e);ctrl3d.target.lerpVectors(st,et,e);
    if(p<1)requestAnimationFrame(anim);
  })(s);
  projectionOn=true;panelsOn=true;ctrl3d.autoRotate=true;
  ['btnProject','btnPanels'].forEach(id=>document.getElementById(id).classList.add('on'));
  document.getElementById('btnOrbit').classList.add('on');
};

window.shot=function(){
  renderer.render(scene,camera);
  const a=document.createElement('a');
  a.download='Yphone_Puck_'+Date.now()+'.png';a.href=renderer.domElement.toDataURL('image/png');a.click();
};

// Keyboard
addEventListener('keydown',e=>{
  switch(e.key.toLowerCase()){
    case'r':t('orbit');break;case'p':t('project');break;
    case'd':t('panels');break;case's':if(!e.ctrlKey)shot();break;
    case'f':document.documentElement.requestFullscreen?.().catch(()=>{});break;
    case'0':resetAll();break;
  }
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ========== ANIMATION ==========
const clock=new THREE.Clock();
let hintGone=false;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.1);
  const t=performance.now()*0.001;
  ctrl3d.update();

  // Hide hint on interaction
  if(!hintGone&&(Math.abs(ctrl3d.target.x)>0.05||Math.abs(camera.position.x-2.8)>0.1)){
    document.getElementById('hint').style.opacity='0';hintGone=true;
  }

  // Puck subtle float + rotation
  puckGroup.rotation.y+=dt*0.2;
  puckGroup.position.y=0.08+Math.sin(t*0.8)*0.01;

  // Lens pulse
  const lensPulse=1+Math.sin(t*3)*0.3;
  lensDot.scale.setScalar(lensPulse);
  lensDotMat.opacity=0.5+Math.sin(t*3)*0.3;
  topGlassMat.emissiveIntensity=0.2+Math.sin(t*3)*0.15;

  // LED ring pulse
  ledMat.opacity=0.5+Math.sin(t*2)*0.25;

  // Projection beam visibility
  const beamTarget=projectionOn?1:0;
  beamGroup.children.forEach(c=>{
    if(c.material&&c.material.opacity!==undefined){
      const baseOp=c.material.userData?.baseOp||c.material.opacity||0.15;
      if(!c.material.userData){c.material.userData={baseOp:baseOp};}
      c.material.opacity+=(beamTarget*c.material.userData.baseOp-c.material.opacity)*dt*3;
    }
  });
  beamPts.material.opacity+=(beamTarget*0.6-beamPts.material.opacity)*dt*3;
  cone.material.opacity+=(beamTarget*0.04-cone.material.opacity)*dt*3;

  // Hologram visibility
  const holoTarget=projectionOn?1:0.05;
  aiGroup.children.forEach(c=>{
    if(c.material&&c.material.opacity!==undefined) {
      const orig=c.material.userData?.origOp||c.material.opacity;
      if(!c.material.userData){c.material.userData={origOp:orig};}
      c.material.opacity+=(holoTarget*c.material.userData.origOp-c.material.opacity)*dt*3;
    }
  });
  aiPointLight.intensity+=(projectionOn?6:0.1-aiPointLight.intensity)*dt*3;

  // AI core animations
  aiOuterWire.rotation.y+=dt*0.4;aiOuterWire.rotation.x+=dt*0.2;
  aiInnerWire.rotation.y-=dt*0.55;aiInnerWire.rotation.z+=dt*0.3;
  const corePulse=1+Math.sin(t*3.5)*0.25;
  aiSolid.scale.setScalar(corePulse);
  aiSolidMat.opacity=(0.5+Math.sin(t*3.5)*0.2)*holoTarget;
  aiHalo.scale.setScalar(1+Math.sin(t*2.5)*0.3);
  aiRing1.rotation.z+=dt*0.7;aiRing1.rotation.x+=dt*0.35;
  aiRing2.rotation.z-=dt*0.55;aiRing2.rotation.y+=dt*0.4;

  // AI dots
  aiDots.forEach(d=>{
    d.userData.a+=dt*d.userData.sp;
    const a=d.userData.a,r=d.userData.r;
    d.position.x=Math.cos(a)*r;
    d.position.y=Math.sin(a)*r*0.5+Math.sin(t+d.userData.oy)*0.1;
    d.position.z=Math.sin(a)*r*0.5;
  });

  // AI point light pulse
  aiPointLight.intensity=projectionOn?(5.5+Math.sin(t*3.5)*1.5):0.1;

  // Beam particles
  const bpArr=beamPts.geometry.attributes.position.array;
  for(let i=0;i<beamPartCount;i++){
    const d=beamPartData[i];
    d.h-=dt*d.speed*0.6;
    if(d.h<0){d.h=2.8;d.a=Math.random()*Math.PI*2;}
    const r=d.h*0.2;
    bpArr[i*3]=Math.cos(d.a)*r;
    bpArr[i*3+1]=d.h;
    bpArr[i*3+2]=Math.sin(d.a)*r;
  }
  beamPts.geometry.attributes.position.needsUpdate=true;

  // Panels
  panels.forEach((p,i)=>{
    const targetOp=panelsOn&&projectionOn?1:0.04;
    p.material.opacity+=(targetOp-p.material.opacity)*dt*4;
    // Subtle float
    p.position.y=p.userData.p[1]+Math.sin(t*0.7+i*0.8)*0.06;
  });

  // Ambient particles
  ambPts.rotation.y+=dt*0.06;

  // Hologram float
  holoRoot.position.y=1.8+Math.sin(t*0.5)*0.08;

  // Update live feed panel (index 5)
  if(panelsOn&&projectionOn&&Math.floor(t)%4===0&&Math.floor(t)!==panels[5]?.userData._lu){
    const fp=panels[5];if(fp?.userData){
      fp.userData._lu=Math.floor(t);
      const ts=new Date().toTimeString().slice(0,8);
      fp.material.map?.dispose();
      fp.material.map=makePanelTex('LIVE UPDATE FEED',[
        `> [${ts}] GPU Optimizer v${Math.floor(Math.random()*5+1)}`,
        `✓ [${ts}] Self-Check Passed`,
        `> [${ts}] Module Sync Done`,`✓ [${ts}] Cloud Weights OK`,
        `  [${ts}] Routine Scan`,'  [${ts}] Idle — Nominal'
      ]);
      fp.material.needsUpdate=true;
    }
  }

  // Hologram light pulse
  holoLight.intensity=projectionOn?(11+Math.sin(t*3)*2):2;

  renderer.render(scene,camera);
}

animate();
setTimeout(()=>{document.getElementById('load').classList.add('done');setTimeout(()=>document.getElementById('load').remove(),600)},400);

console.log('%c⚡ YPHONE PUCK %c· %cBanana Company %c· %cWearable Holographic Projector',
  'color:#00d4ff;font-weight:700;font-size:15px;','','color:#0071e3;','','color:#557788;');
console.log('HOVER the puck | CLICK panels | R=orbit P=projection D=data | 0=reset');
</script>
