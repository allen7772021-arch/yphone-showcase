<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yphone — 3D Product Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #0071e3;
    --text: #1d1d1f;
    --text-secondary: #86868b;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #000;
    overflow: hidden;
    height: 100vh;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas { display: block; }

  /* ===== TOP BAR ===== */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 20px 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }
  .topbar > * { pointer-events: auto; }

  .brand {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .brand span { font-weight: 400; color: #a1a1aa; font-size: 14px; margin-left: 8px; }

  /* ===== BOTTOM CONTROLS ===== */
  .controls {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 10px;
    background: rgba(30,30,30,0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 8px 10px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .ctrl-btn {
    padding: 10px 18px;
    border-radius: 18px;
    border: none;
    background: transparent;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: inherit;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.1); }
  .ctrl-btn.active {
    background: var(--accent);
    color: #fff;
  }
  .ctrl-btn.icon-btn {
    width: 38px; height: 38px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 16px;
  }

  /* ===== INFO OVERLAY ===== */
  .info-panel {
    position: fixed;
    top: 50%;
    right: 28px;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .info-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }
  .info-dot:hover, .info-dot.highlight {
    background: var(--accent);
    box-shadow: 0 0 12px rgba(0,113,227,0.6);
    transform: scale(1.3);
  }
  .info-dot .tooltip {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(30,30,30,0.9);
    backdrop-filter: blur(12px);
    color: #fff;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 11px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .info-dot:hover .tooltip { opacity: 1; }

  /* ===== HINT ===== */
  .hint {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.04em;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }

  /* ===== LOADING ===== */
  .loading {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease;
  }
  .loading.done { opacity: 0; pointer-events: none; }
  .loading .loader {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* responsive */
  @media (max-width: 600px) {
    .controls { gap: 4px; padding: 6px 8px; }
    .ctrl-btn { padding: 8px 12px; font-size: 11px; }
    .info-panel { right: 8px; }
    .topbar { padding: 14px 16px; }
    .brand { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="loading" id="loading"><div class="loader"></div></div>

<div class="topbar">
  <div class="brand">Yphone <span>Banana Company</span></div>
</div>

<div class="hint" id="hint">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>

<div class="info-panel" id="infoPanel">
  <div class="info-dot" data-module="ai"><span class="tooltip">Yphone AI Core</span></div>
  <div class="info-dot" data-module="cpu"><span class="tooltip">CPU Module</span></div>
  <div class="info-dot" data-module="gpu"><span class="tooltip">GPU Module</span></div>
  <div class="info-dot" data-module="battery"><span class="tooltip">Battery Pack</span></div>
</div>

<div class="controls" id="controls">
  <button class="ctrl-btn active" id="btnAutoRotate" onclick="toggleAutoRotate()">⟳ Auto Rotate</button>
  <button class="ctrl-btn" id="btnExplode" onclick="toggleExplode()">🔩 Explode View</button>
  <button class="ctrl-btn" id="btnBackPanel" onclick="toggleBackPanel()">◈ Back Off</button>
  <button class="ctrl-btn icon-btn" onclick="resetView()" title="Reset view">↺</button>
  <button class="ctrl-btn icon-btn" onclick="captureScreenshot()" title="Screenshot">📷</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===== SCENE SETUP =====
const scene = new THREE.Scene();

// Background gradient (simulated with scene background + fog)
scene.background = new THREE.Color(0x0a0a0c);
scene.fog = new THREE.Fog(0x0a0a0c, 8, 30);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.5, 50);
camera.position.set(4.5, 1.8, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ===== ORBIT CONTROLS =====
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;
controls.minDistance = 4;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.75;
controls.target.set(0, 0.1, 0);
controls.update();

// Hide hint after first interaction
let hintHidden = false;
renderer.domElement.addEventListener('pointerdown', () => {
  if (!hintHidden) {
    document.getElementById('hint').style.opacity = '0';
    hintHidden = true;
  }
});

// ===== LIGHTING (Apple-style 3-point + accent) =====
// Key light
const keyLight = new THREE.DirectionalLight(0xffffff, 4);
keyLight.position.set(5, 6, 8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 50;
keyLight.shadow.camera.left = -8;
keyLight.shadow.camera.right = 8;
keyLight.shadow.camera.top = 8;
keyLight.shadow.camera.bottom = -8;
keyLight.shadow.bias = -0.0001;
scene.add(keyLight);

// Fill light
const fillLight = new THREE.DirectionalLight(0x8899cc, 1.2);
fillLight.position.set(-3, 2, -1);
scene.add(fillLight);

// Rim light (back edge highlight)
const rimLight = new THREE.DirectionalLight(0xffffff, 3);
rimLight.position.set(0, 1, -6);
scene.add(rimLight);

// Bottom bounce
const bounceLight = new THREE.DirectionalLight(0x4466aa, 0.8);
bounceLight.position.set(0, -2, 3);
scene.add(bounceLight);

// Ambient
const ambient = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambient);

// ===== FLOOR (subtle reflection platform) =====
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x111118,
  roughness: 0.4,
  metalness: 0.3,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -5;
floor.receiveShadow = true;
scene.add(floor);

// Studio backdrop (curved)
const backdropGeo = new THREE.CylinderGeometry(6, 6, 8, 64, 1, true);
const backdropMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a22,
  roughness: 0.9,
  metalness: 0,
  side: THREE.BackSide,
});
const backdrop = new THREE.Mesh(backdropGeo, backdropMat);
backdrop.position.y = 0.5;
backdrop.receiveShadow = true;
scene.add(backdrop);

// ===== MATERIALS =====
// Titanium frame
const titaniumMat = new THREE.MeshStandardMaterial({
  color: 0xd4d0c8,
  roughness: 0.3,
  metalness: 0.9,
});

// Dark titanium (sides)
const darkTitaniumMat = new THREE.MeshStandardMaterial({
  color: 0x8a8780,
  roughness: 0.35,
  metalness: 0.85,
});

// Glass front
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0x0a0a0a,
  roughness: 0.1,
  metalness: 0.05,
  clearcoat: 0.3,
  clearcoatRoughness: 0.1,
});

// Screen
const screenMat = new THREE.MeshStandardMaterial({
  color: 0x111118,
  roughness: 0.05,
  metalness: 0.02,
});

// Back panel (aluminum)
const backPanelMat = new THREE.MeshStandardMaterial({
  color: 0xe8e4dc,
  roughness: 0.35,
  metalness: 0.6,
});

// Internal base (dark)
const internalBaseMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a1e,
  roughness: 0.5,
  metalness: 0.4,
});

// AI Core
const aiCoreMat = new THREE.MeshStandardMaterial({
  color: 0x0088ff,
  roughness: 0.1,
  metalness: 0.1,
  emissive: 0x0055cc,
  emissiveIntensity: 1.5,
});

// AI Core glow
const aiGlowMat = new THREE.MeshBasicMaterial({
  color: 0x3399ff,
  transparent: true,
  opacity: 0.3,
  depthWrite: false,
});

// Modules
const cpuMat = new THREE.MeshStandardMaterial({
  color: 0x2c2c30,
  roughness: 0.3,
  metalness: 0.7,
});

const gpuMat = new THREE.MeshStandardMaterial({
  color: 0x3a3040,
  roughness: 0.3,
  metalness: 0.65,
});

const batteryMat = new THREE.MeshStandardMaterial({
  color: 0x2a2a2e,
  roughness: 0.4,
  metalness: 0.5,
});

const sensorMat = new THREE.MeshStandardMaterial({
  color: 0x252528,
  roughness: 0.25,
  metalness: 0.7,
});

// ===== BUILD YPHONE MODEL =====

const phoneGroup = new THREE.Group();
const bodyGroup = new THREE.Group();
const internalGroup = new THREE.Group();
scene.add(phoneGroup);
phoneGroup.add(bodyGroup);
phoneGroup.add(internalGroup);

// -- Phone body (rounded rectangle via ExtrudeGeometry) --
function createRoundedRectShape(w, h, r) {
  const shape = new THREE.Shape();
  shape.moveTo(-w + r, -h);
  shape.lineTo(w - r, -h);
  shape.quadraticCurveTo(w, -h, w, -h + r);
  shape.lineTo(w, h - r);
  shape.quadraticCurveTo(w, h, w - r, h);
  shape.lineTo(-w + r, h);
  shape.quadraticCurveTo(-w, h, -w, h - r);
  shape.lineTo(-w, -h + r);
  shape.quadraticCurveTo(-w, -h, -w + r, -h);
  return shape;
}

// Phone dimensions
const PW = 1.55;  // half-width
const PH = 3.15;  // half-height
const PD = 0.15;  // half-depth
const CR = 0.35;  // corner radius

// Main body shape
const bodyShape = createRoundedRectShape(PW, PH, CR);
const extrudeSettings = { steps: 1, depth: PD * 2, bevelEnabled: true, bevelThickness: 0.04, bevelSize: 0.04, bevelSegments: 3 };
const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, extrudeSettings);
bodyGeo.translate(0, 0, -PD);
const bodyMesh = new THREE.Mesh(bodyGeo, titaniumMat);
bodyMesh.castShadow = true;
bodyMesh.receiveShadow = true;
bodyGroup.add(bodyMesh);

// Front glass (slightly recessed)
const glassShape = createRoundedRectShape(PW - 0.06, PH - 0.06, CR - 0.04);
const glassGeo = new THREE.ExtrudeGeometry(glassShape, { steps: 1, depth: 0.02, bevelEnabled: false });
glassGeo.translate(0, 0, PD - 0.015);
const glassMesh = new THREE.Mesh(glassGeo, glassMat);
bodyGroup.add(glassMesh);

// Screen display area
const screenShape = createRoundedRectShape(PW - 0.25, PH - 0.55, CR * 0.6);
const screenGeo = new THREE.ShapeGeometry(screenShape);
const screenMesh = new THREE.Mesh(screenGeo, screenMat);
screenMesh.position.z = PD + 0.002;
bodyGroup.add(screenMesh);

// Camera notch / Dynamic Island
const notchGeo = new THREE.CapsuleGeometry(0.14, 0.25, 4, 8);
const notchMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.05 });
const notch = new THREE.Mesh(notchGeo, notchMat);
notch.position.set(0, PH - 0.65, PD + 0.003);
bodyGroup.add(notch);

// Back panel (removable)
const backShape = createRoundedRectShape(PW - 0.08, PH - 0.08, CR - 0.06);
const backGeo = new THREE.ExtrudeGeometry(backShape, { steps: 1, depth: 0.04, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 2 });
backGeo.translate(0, 0, -PD - 0.02);
const backPanel = new THREE.Mesh(backGeo, backPanelMat);
backPanel.castShadow = true;
backPanel.name = 'backPanel';
bodyGroup.add(backPanel);

// Apple logo placeholder (small circle on back)
const logoGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.005, 32);
const logoMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
const logo = new THREE.Mesh(logoGeo, logoMat);
logo.position.z = -PD - 0.04;
logo.rotation.x = Math.PI / 2;
bodyGroup.add(logo);

// ===== INTERNAL COMPONENTS (hidden under back panel) =====

// Internal base plate
const basePlateGeo = new THREE.ExtrudeGeometry(
  createRoundedRectShape(PW - 0.15, PH - 0.15, CR - 0.1),
  { steps: 1, depth: 0.03, bevelEnabled: false }
);
basePlateGeo.translate(0, 0, -PD + 0.01);
const basePlate = new THREE.Mesh(basePlateGeo, internalBaseMat);
internalGroup.add(basePlate);

// -- AI Core (center, slightly above center of phone) --
const aiCoreGroup = new THREE.Group();
aiCoreGroup.position.set(0, 0.3, -0.08);
aiCoreGroup.name = 'aiCore';

// Core sphere
const coreGeo = new THREE.IcosahedronGeometry(0.16, 2);
const coreMesh = new THREE.Mesh(coreGeo, aiCoreMat);
aiCoreGroup.add(coreMesh);

// Glow halo (larger transparent sphere)
const glowGeo = new THREE.SphereGeometry(0.27, 32, 32);
const glowMesh = new THREE.Mesh(glowGeo, aiGlowMat);
aiCoreGroup.add(glowMesh);

// Outer ring
const ringGeo = new THREE.TorusGeometry(0.22, 0.02, 16, 48);
const ringMat = new THREE.MeshStandardMaterial({
  color: 0x3399ff,
  roughness: 0.2,
  metalness: 0.3,
  emissive: 0x1155aa,
  emissiveIntensity: 0.8,
});
const ringMesh = new THREE.Mesh(ringGeo, ringMat);
aiCoreGroup.add(ringMesh);

// Second ring (angled)
const ring2 = new THREE.Mesh(
  new THREE.TorusGeometry(0.24, 0.015, 16, 48),
  ringMat
);
ring2.rotation.x = Math.PI / 2;
aiCoreGroup.add(ring2);

internalGroup.add(aiCoreGroup);

// -- CPU Module --
const cpuGroup = new THREE.Group();
cpuGroup.position.set(0.6, 0.3, -0.08);
cpuGroup.name = 'cpuModule';
const cpuBlock = new THREE.Mesh(
  new THREE.BoxGeometry(0.35, 0.5, 0.06, 2, 2, 2),
  cpuMat
);
cpuGroup.add(cpuBlock);
// CPU detail lines
const cpuDetailGeo = new THREE.BoxGeometry(0.28, 0.06, 0.065, 1, 1, 1);
const cpuDetail = new THREE.Mesh(cpuDetailGeo, new THREE.MeshStandardMaterial({
  color: 0x444448, roughness: 0.2, metalness: 0.8
}));
cpuDetail.position.y = -0.1;
cpuGroup.add(cpuDetail);
internalGroup.add(cpuGroup);

// -- GPU Module --
const gpuGroup = new THREE.Group();
gpuGroup.position.set(-0.55, 0.35, -0.08);
gpuGroup.name = 'gpuModule';
const gpuBlock = new THREE.Mesh(
  new THREE.BoxGeometry(0.4, 0.45, 0.06, 2, 2, 2),
  gpuMat
);
gpuGroup.add(gpuBlock);
// GPU accent stripe
const gpuStripe = new THREE.Mesh(
  new THREE.BoxGeometry(0.34, 0.04, 0.065, 1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0x665577, roughness: 0.15, metalness: 0.7, emissive: 0x110022, emissiveIntensity: 0.4 })
);
gpuStripe.position.y = 0.1;
gpuGroup.add(gpuStripe);
internalGroup.add(gpuGroup);

// -- Battery --
const batteryGroup = new THREE.Group();
batteryGroup.position.set(0, -1.4, -0.07);
batteryGroup.name = 'batteryModule';
const batteryBlock = new THREE.Mesh(
  new THREE.BoxGeometry(1.1, 1.0, 0.05, 3, 3, 2),
  batteryMat
);
batteryGroup.add(batteryBlock);
// Battery cell lines
for (let i = -1; i <= 1; i += 2) {
  const cellLine = new THREE.Mesh(
    new THREE.BoxGeometry(0.02, 0.85, 0.055, 1, 1, 1),
    new THREE.MeshStandardMaterial({ color: 0x3a3a40, roughness: 0.3, metalness: 0.6 })
  );
  cellLine.position.x = i * 0.3;
  batteryGroup.add(cellLine);
}
internalGroup.add(batteryGroup);

// -- Sensor / Connectivity module --
const sensorGroup = new THREE.Group();
sensorGroup.position.set(0, -2.1, -0.07);
sensorGroup.name = 'sensorModule';
const sensorBlock = new THREE.Mesh(
  new THREE.BoxGeometry(0.6, 0.3, 0.04, 2, 1, 2),
  sensorMat
);
sensorGroup.add(sensorBlock);
// Tiny sensor dots
for (let x = -0.18; x <= 0.18; x += 0.12) {
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 })
  );
  dot.position.set(x, 0, 0.025);
  sensorGroup.add(dot);
}
internalGroup.add(sensorGroup);

// ===== PARTICLE SYSTEM (around AI core) =====
const particlesGroup = new THREE.Group();
particlesGroup.position.copy(aiCoreGroup.position);
const particleCount = 60;
const particleGeo = new THREE.SphereGeometry(0.015, 4, 4);
const particleMat = new THREE.MeshBasicMaterial({ color: 0x66bbff, transparent: true, opacity: 0.7, depthWrite: false });

const particles = [];
for (let i = 0; i < particleCount; i++) {
  const particle = new THREE.Mesh(particleGeo, particleMat);
  // Random position on a sphere shell
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const radius = 0.35 + Math.random() * 0.6;
  particle.position.set(
    radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.sin(phi) * Math.sin(theta),
    radius * Math.cos(phi)
  );
  particle.userData = {
    baseRadius: radius,
    theta,
    phi,
    speed: 0.3 + Math.random() * 0.8,
    offset: Math.random() * Math.PI * 2,
  };
  particlesGroup.add(particle);
  particles.push(particle);
}
internalGroup.add(particlesGroup);

// AI core point light
const aiPointLight = new THREE.PointLight(0x3399ff, 2, 1.5, 2);
aiPointLight.position.copy(aiCoreGroup.position);
internalGroup.add(aiPointLight);

// ===== STATE =====
let exploded = false;
let backPanelOff = false;
const explodeTargets = {
  aiCore: new THREE.Vector3(0, 0.3, -0.5),
  cpuModule: new THREE.Vector3(0.6, 0.3, -0.55),
  gpuModule: new THREE.Vector3(-0.55, 0.35, -0.55),
  batteryModule: new THREE.Vector3(0, -1.4, -0.5),
  sensorModule: new THREE.Vector3(0, -2.1, -0.5),
};
const explodeOriginals = {
  aiCore: new THREE.Vector3(0, 0.3, -0.08),
  cpuModule: new THREE.Vector3(0.6, 0.3, -0.08),
  gpuModule: new THREE.Vector3(-0.55, 0.35, -0.08),
  batteryModule: new THREE.Vector3(0, -1.4, -0.07),
  sensorModule: new THREE.Vector3(0, -2.1, -0.07),
};
const backPanelOriginal = new THREE.Vector3(0, 0, 0);
const backPanelOffTarget = new THREE.Vector3(0, -2.5, -1.2);

// ===== ANIMATION LOOP =====
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const t = performance.now() * 0.001;

  controls.update();

  // Pulse AI core
  const pulse = 1 + Math.sin(t * 2.5) * 0.15;
  aiCoreGroup.children.forEach(c => {
    if (c.geometry && c.geometry.type === 'IcosahedronGeometry') {
      c.scale.setScalar(pulse);
    }
  });
  // Pulse glow
  const glowPulse = 0.25 + Math.sin(t * 2.5) * 0.08;
  glowMesh.material.opacity = glowPulse;

  // Pulse AI light
  aiPointLight.intensity = 1.8 + Math.sin(t * 2.5) * 0.5;

  // Rotate rings
  ringMesh.rotation.z += dt * 0.8;
  ringMesh.rotation.x += dt * 0.3;
  ring2.rotation.z -= dt * 0.5;
  ring2.rotation.y += dt * 0.4;

  // Animate particles
  particles.forEach(p => {
    const ud = p.userData;
    const angle = ud.theta + t * ud.speed;
    const r = ud.baseRadius + Math.sin(t * 1.5 + ud.offset) * 0.08;
    p.position.set(
      r * Math.sin(ud.phi) * Math.cos(angle),
      r * Math.sin(ud.phi) * Math.sin(angle),
      r * Math.cos(ud.phi)
    );
    p.material.opacity = 0.3 + Math.sin(t * 2 + ud.offset) * 0.2;
  });

  // Smooth transition for explode / back panel
  const lerpSpeed = 4 * dt;
  [
    { group: aiCoreGroup, key: 'aiCore' },
    { group: cpuGroup, key: 'cpuModule' },
    { group: gpuGroup, key: 'gpuModule' },
    { group: batteryGroup, key: 'batteryModule' },
    { group: sensorGroup, key: 'sensorModule' },
  ].forEach(({ group, key }) => {
    const target = exploded ? explodeTargets[key] : explodeOriginals[key];
    group.position.lerp(target, lerpSpeed);
  });

  // Back panel
  const bpTarget = backPanelOff ? backPanelOffTarget : backPanelOriginal;
  backPanel.position.lerp(bpTarget, lerpSpeed);

  renderer.render(scene, camera);
}

// ===== UI FUNCTIONS =====
window.toggleAutoRotate = function() {
  controls.autoRotate = !controls.autoRotate;
  document.getElementById('btnAutoRotate').classList.toggle('active', controls.autoRotate);
};

window.toggleExplode = function() {
  exploded = !exploded;
  document.getElementById('btnExplode').classList.toggle('active', exploded);
  // Auto-open back panel when exploding
  if (exploded && !backPanelOff) {
    backPanelOff = true;
    document.getElementById('btnBackPanel').classList.add('active');
  } else if (!exploded && backPanelOff) {
    backPanelOff = false;
    document.getElementById('btnBackPanel').classList.remove('active');
  }
};

window.toggleBackPanel = function() {
  backPanelOff = !backPanelOff;
  document.getElementById('btnBackPanel').classList.toggle('active', backPanelOff);
};

window.resetView = function() {
  // Smooth reset camera
  const start = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  const end = { x: 4.5, y: 1.8, z: 8 };
  const startTarget = controls.target.clone();
  const endTarget = new THREE.Vector3(0, 0.1, 0);
  const startTime = performance.now();
  const duration = 800;

  function animReset(now) {
    const p = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3); // ease-out
    camera.position.set(
      start.x + (end.x - start.x) * ease,
      start.y + (end.y - start.y) * ease,
      start.z + (end.z - start.z) * ease
    );
    controls.target.lerpVectors(startTarget, endTarget, ease);
    if (p < 1) requestAnimationFrame(animReset);
  }
  requestAnimationFrame(animReset);

  // Reset state
  exploded = false;
  backPanelOff = false;
  document.getElementById('btnExplode').classList.remove('active');
  document.getElementById('btnBackPanel').classList.remove('active');
  controls.autoRotate = true;
  document.getElementById('btnAutoRotate').classList.add('active');
};

window.captureScreenshot = function() {
  renderer.render(scene, camera);
  const link = document.createElement('a');
  link.download = 'Yphone_3D_Render.png';
  link.href = renderer.domElement.toDataURL('image/png');
  link.click();
};

// ===== KEYBOARD SHORTCUTS =====
window.addEventListener('keydown', (e) => {
  switch(e.key.toLowerCase()) {
    case 'r': controls.autoRotate = !controls.autoRotate;
      document.getElementById('btnAutoRotate').classList.toggle('active', controls.autoRotate);
      break;
    case 'e': window.toggleExplode(); break;
    case 'b': window.toggleBackPanel(); break;
    case '0': window.resetView(); break;
    case 's': if (!e.ctrlKey && !e.metaKey) { window.captureScreenshot(); } break;
  }
});

// ===== RESIZE =====
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== START =====
animate();

// Hide loading
setTimeout(() => {
  document.getElementById('loading').classList.add('done');
  setTimeout(() => document.getElementById('loading').remove(), 600);
}, 400);

// Log info
console.log('%cYphone 3D Viewer %c· %cBanana Company',
  'font-weight:700;font-size:16px;color:#fff;', '', 'color:#0071e3;');
console.log('R = auto-rotate | E = explode | B = back panel | S = screenshot | 0 = reset');
console.log('Drag to rotate | Scroll to zoom | Right-drag to pan');
</script>
