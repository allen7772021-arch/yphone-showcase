<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yphone — JARVIS Holographic Interface</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--cyan:#00d4ff;--amber:#ff9500;--green:#44ddaa;--white:#e0f0ff;--bg:#000510}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Mono',monospace,sans-serif;
    background:var(--bg);overflow:hidden;height:100vh;
    -webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;
  }
  canvas{display:block}

  /* Top bar */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:10;
    padding:16px 24px;display:flex;justify-content:space-between;align-items:center;
    pointer-events:none;
  }
  .topbar>*{pointer-events:auto}
  .brand{font-size:18px;font-weight:600;color:var(--white);letter-spacing:-0.02em}
  .brand b{color:var(--cyan);font-weight:700}
  .sys-status{
    font-size:10px;letter-spacing:0.12em;color:var(--green);
    border:1px solid rgba(68,221,170,0.25);border-radius:20px;
    padding:6px 14px;background:rgba(68,221,170,0.05);
  }
  .sys-status .live{display:inline-block;width:5px;height:5px;border-radius:50%;
    background:var(--green);margin-right:6px;box-shadow:0 0 8px var(--green)}

  /* Bottom controls */
  .controls{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;gap:6px;background:rgba(5,15,30,0.9);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-radius:22px;padding:6px 8px;border:1px solid rgba(0,212,255,0.1);
  }
  .ctrl{
    padding:8px 14px;border-radius:16px;border:1px solid transparent;
    background:transparent;color:#7799aa;font-size:11px;font-weight:500;
    cursor:pointer;transition:all 0.25s ease;font-family:inherit;
    letter-spacing:0.03em;white-space:nowrap;
  }
  .ctrl:hover{color:var(--white);background:rgba(0,212,255,0.06);border-color:rgba(0,212,255,0.2)}
  .ctrl.on{background:rgba(0,212,255,0.1);color:var(--cyan);border-color:rgba(0,212,255,0.3)}
  .ctrl.icon{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%}

  /* Focus panel (appears on click) */
  .focus-panel{
    position:fixed;top:50%;right:24px;transform:translateY(-50%);z-index:10;
    background:rgba(5,15,30,0.92);border:1px solid rgba(0,200,240,0.2);
    border-radius:14px;padding:20px 22px;min-width:200px;
    opacity:0;pointer-events:none;transition:opacity 0.4s ease;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  }
  .focus-panel.show{opacity:1;pointer-events:auto}
  .focus-panel .fp-title{font-size:10px;letter-spacing:0.15em;color:var(--cyan);margin-bottom:6px}
  .focus-panel .fp-name{font-size:16px;font-weight:600;color:var(--white);margin-bottom:12px}
  .focus-panel .fp-row{display:flex;justify-content:space-between;font-size:11px;
    color:#8899aa;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
  .focus-panel .fp-row .val{color:var(--cyan);font-family:'SF Mono',monospace}
  .focus-panel .fp-close{
    position:absolute;top:8px;right:12px;background:none;border:none;
    color:#557788;cursor:pointer;font-size:16px
  }

  /* Hint */
  .hint{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:10;
    font-size:11px;color:rgba(119,153,170,0.5);letter-spacing:0.06em;
    pointer-events:none;transition:opacity 0.8s ease;
  }

  /* Loading */
  .load{
    position:fixed;inset:0;z-index:100;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;transition:opacity 0.5s ease;
  }
  .load.done{opacity:0;pointer-events:none}
  .load-ring{width:40px;height:40px;border:1.5px solid rgba(0,212,255,0.15);
    border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite}
  .load span{font-size:10px;letter-spacing:0.15em;color:#446677}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:600px){
    .controls{gap:2px;padding:4px 5px}
    .ctrl{padding:6px 10px;font-size:10px}
    .ctrl.icon{width:28px;height:28px}
    .topbar{padding:12px 16px}
    .brand{font-size:15px}
    .focus-panel{right:8px;min-width:160px;padding:14px 16px}
  }
</style>
</head>
<body>

<div class="load" id="load"><div class="load-ring"></div><span>INITIALIZING JARVIS INTERFACE</span></div>

<div class="topbar">
  <div class="brand">YPHONE<b>·</b>CORE</div>
  <div class="sys-status"><span class="live"></span>SYSTEM ACTIVE</div>
</div>

<div class="hint" id="hint">DRAG TO ORBIT &nbsp;·&nbsp; SCROLL TO ZOOM &nbsp;·&nbsp; HOVER PHONE MODULES &nbsp;·&nbsp; CLICK TO INSPECT</div>

<div class="focus-panel" id="focusPanel">
  <button class="fp-close" onclick="closeFocus()">✕</button>
  <div class="fp-title" id="fpTitle">MODULE DETAIL</div>
  <div class="fp-name" id="fpName">Select a module</div>
  <div id="fpRows"></div>
</div>

<div class="controls">
  <button class="ctrl on" id="btnOrbit" onclick="t('orbit')">⟳ ORBIT</button>
  <button class="ctrl" id="btnExplode" onclick="t('explode')">◈ EXPLODE</button>
  <button class="ctrl on" id="btnHUD" onclick="t('hud')">⊞ HUD</button>
  <button class="ctrl" id="btnScan" onclick="t('scan')">▣ SCAN</button>
  <button class="ctrl icon" onclick="resetAll()" title="Reset">↺</button>
  <button class="ctrl icon" onclick="shot()" title="Capture">◎</button>
</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ========== SCENE SETUP ==========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000510);
scene.fog = new THREE.FogExp2(0x000510, 0.00012);

const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.3, 60);
camera.position.set(4.5, 2.5, 9);
camera.lookAt(0, 0.4, 0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.3;
document.body.appendChild(renderer.domElement);

// Controls
const ctrl3d = new OrbitControls(camera,renderer.domElement);
ctrl3d.enableDamping=true;ctrl3d.dampingFactor=0.06;
ctrl3d.autoRotate=true;ctrl3d.autoRotateSpeed=0.35;
ctrl3d.minDistance=3;ctrl3d.maxDistance=15;
ctrl3d.maxPolarAngle=Math.PI*0.72;
ctrl3d.target.set(0,0.4,0);ctrl3d.update();

// Lighting
scene.add(new THREE.AmbientLight(0x112244,0.4));
const dl = new THREE.DirectionalLight(0xccddff,2);
dl.position.set(6,8,6);scene.add(dl);
const pl = new THREE.PointLight(0x0099cc,8,10);
pl.position.set(0,2,0);scene.add(pl);
scene.add(new THREE.PointLight(0x003355,3,8,-4,-1,-5));

// ========== HELPERS ==========
function roundedRect(w,h,r){
  const s=new THREE.Shape();
  s.moveTo(-w+r,-h);s.lineTo(w-r,-h);
  s.quadraticCurveTo(w,-h,w,-h+r);s.lineTo(w,h-r);
  s.quadraticCurveTo(w,h,w-r,h);s.lineTo(-w+r,h);
  s.quadraticCurveTo(-w,h,-w,h-r);s.lineTo(-w,-h+r);
  s.quadraticCurveTo(-w,-h,-w+r,-h);return s;
}

function makePanelTex(title,lines,w=512,h=280){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  ctx.fillStyle='rgba(0,8,22,0.88)';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,180,220,0.45)';ctx.lineWidth=1;ctx.strokeRect(3,3,w-6,h-6);
  const cs=16;
  ctx.strokeStyle='rgba(0,212,255,0.7)';ctx.lineWidth=1.5;
  [[3,3+cs,3,3,3+cs,3],[w-3-cs,3,w-3,3,w-3,3+cs],[3,h-3-cs,3,h-3,3+cs,h-3],[w-3-cs,h-3,w-3,h-3,w-3,h-3-cs]]
    .forEach(([x1,y1,x2,y2,x3,y3])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.stroke()});
  ctx.fillStyle='#00d4ff';ctx.font='600 12px "SF Mono",monospace';ctx.fillText(title,18,34);
  ctx.strokeStyle='rgba(0,160,200,0.25)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(18,42);ctx.lineTo(w-18,42);ctx.stroke();
  ctx.font='10px "SF Mono",monospace';
  lines.forEach((l,i)=>{
    if(l[0]==='>')ctx.fillStyle='#00d4ff';
    else if(l[0]==='✓')ctx.fillStyle='#44ddaa';
    else if(l[0]==='!')ctx.fillStyle='#ff9500';
    else ctx.fillStyle='#8899bb';
    ctx.fillText(l,18,60+i*18);
  });
  const t=new THREE.CanvasTexture(c);t.minFilter=THREE.LinearFilter;return t;
}

// ========== GROUND ==========
scene.add(new THREE.PolarGridHelper(7,64,36,64,0x002238,0x001522).translateY(-3.3));
const g2=new THREE.PolarGridHelper(3,48,20,64,0x003350,0x001a30);
g2.position.y=-3.29;scene.add(g2);

// ========== CENTRAL YPHONE (HERO) ==========
const phoneRoot = new THREE.Group();
scene.add(phoneRoot);

const PW=1.1,PH=2.3,PD=0.12,CR=0.28;
const bodyShape=roundedRect(PW,PH,CR);
const bodyExtGeo=new THREE.ExtrudeGeometry(bodyShape,{
  steps:1,depth:PD*2,bevelEnabled:true,bevelThickness:0.04,bevelSize:0.04,bevelSegments:3
});
bodyExtGeo.translate(0,0,-PD);

// Body wireframe (cyan, prominent)
const bodyWire=new THREE.LineSegments(
  new THREE.EdgesGeometry(bodyExtGeo,20),
  new THREE.LineBasicMaterial({color:0x22bbdd,transparent:true,opacity:0.75,depthWrite:false})
);
phoneRoot.add(bodyWire);

// Body faces (semi-transparent, see-through)
const bodyFace=new THREE.Mesh(bodyExtGeo,
  new THREE.MeshBasicMaterial({color:0x002233,transparent:true,opacity:0.06,depthWrite:false,side:THREE.DoubleSide})
);
phoneRoot.add(bodyFace);

// Screen area outline
const screenShape=roundedRect(PW-0.18,PH-0.6,CR*0.55);
const screenEdge=new THREE.LineLoop(
  new THREE.BufferGeometry().setFromPoints(screenShape.getPoints(60)),
  new THREE.LineBasicMaterial({color:0x3399aa,transparent:true,opacity:0.5,depthWrite:false})
);
screenEdge.position.z=PD+0.005;phoneRoot.add(screenEdge);

// Screen fill
const screenGeo=new THREE.ShapeGeometry(screenShape);
const screenFill=new THREE.Mesh(screenGeo,
  new THREE.MeshBasicMaterial({color:0x001020,transparent:true,opacity:0.15,depthWrite:false})
);
screenFill.position.z=PD+0.003;phoneRoot.add(screenFill);

// Dynamic island / camera notch
const notchGeo=new THREE.CapsuleGeometry(0.12,0.22,4,8);
const notch=new THREE.Mesh(notchGeo,
  new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.6,depthWrite:false})
);
notch.position.set(0,PH-0.55,PD+0.006);phoneRoot.add(notch);

// Side buttons (power, volume)
function addSideBtn(x,y,z,rw,rh){
  const g=new THREE.BoxGeometry(rw,rh,0.015);
  const m=new THREE.MeshBasicMaterial({color:0x338899,transparent:true,opacity:0.6,depthWrite:false});
  const btn=new THREE.Mesh(g,m);
  btn.position.set(x,y,z);phoneRoot.add(btn);
}
addSideBtn(PW+0.02,0.3,0,0.03,0.25);
addSideBtn(PW+0.02,-0.3,0,0.03,0.35);
addSideBtn(-PW-0.02,0.35,0,0.03,0.2);

// ========== INTERNAL COMPONENTS ==========
const internals=new THREE.Group();
phoneRoot.add(internals);
const interactiveTargets=[]; // for raycaster

function addModule(name,x,y,w,h,d,color,label){
  const g=new THREE.Group();g.position.set(x,y,0);g.name=name;
  // wireframe box
  const boxGeo=new THREE.BoxGeometry(w,h,d);
  const wire=new THREE.LineSegments(
    new THREE.EdgesGeometry(boxGeo),
    new THREE.LineBasicMaterial({color,transparent:true,opacity:0.7,depthWrite:false})
  );g.add(wire);
  // glow face
  const face=new THREE.Mesh(boxGeo,
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.08,depthWrite:false,side:THREE.DoubleSide})
  );g.add(face);
  // small label dot
  const dot=new THREE.Mesh(
    new THREE.SphereGeometry(0.04,8,8),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.8,depthWrite:false})
  );dot.position.z=d/2+0.02;g.add(dot);

  g.userData={name:label||name,color,w,h,d,basePos:new THREE.Vector3(x,y,0)};
  internals.add(g);
  interactiveTargets.push(g);
  return g;
}

const aiCore=addModule('aiCore',0,0.25,0.28,0.28,0.1,0x33ccff,'AI NEURAL CORE');
const cpuMod=addModule('cpu',0.5,0.35,0.3,0.4,0.07,0x5599cc,'CPU MODULE');
const gpuMod=addModule('gpu',-0.45,0.35,0.32,0.38,0.07,0x9966cc,'GPU MODULE');
const ramMod=addModule('ram',0.55,-0.35,0.22,0.35,0.06,0x6699aa,'MEMORY');
const batMod=addModule('battery',0,-1.35,0.75,0.8,0.05,0x55aa88,'BATTERY PACK');
const senMod=addModule('sensor',0,-2.0,0.5,0.22,0.04,0x778899,'SENSOR HUB');

// Circuit traces on motherboard (thin lines between modules)
const tracePts=[
  [0,0.25,-0.05, 0.5,0.35,-0.05],[0,0.25,-0.05, -0.45,0.35,-0.05],
  [0,0.25,-0.05, 0.55,-0.35,-0.05],[0,0.25,-0.05, 0,-1.35,-0.05],
  [0.5,0.35,-0.05, 0.55,-0.35,-0.05],[-0.45,0.35,-0.05, 0,-1.35,-0.05],
  [0,-1.35,-0.05, 0,-2.0,-0.05]
];
tracePts.forEach(([x1,y1,z1,x2,y2,z2])=>{
  const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1,y1,z1),new THREE.Vector3(x2,y2,z2)]);
  const l=new THREE.Line(g,new THREE.LineBasicMaterial({color:0x115566,transparent:true,opacity:0.35,depthWrite:false}));
  internals.add(l);
});

// AI core special treatment: add orbiting mini-ring
const aiRingGeo=new THREE.TorusGeometry(0.2,0.01,8,32);
const aiRing=new THREE.Mesh(aiRingGeo,
  new THREE.MeshBasicMaterial({color:0x44ddff,transparent:true,opacity:0.7,depthWrite:false})
);
aiRing.position.copy(aiCore.position);internals.add(aiRing);

// ========== HUD RINGS AROUND PHONE ==========
const hudRings=[];
function makeHUDRing(radius,y,tilt,color,opacity,segments=160){
  const g=new THREE.TorusGeometry(radius,0.008,8,segments);
  const m=new THREE.MeshBasicMaterial({color,transparent:true,opacity,depthWrite:false});
  const ring=new THREE.Mesh(g,m);
  ring.position.y=y;ring.rotation.x=Math.PI/2+tilt;

  // Tick marks
  const tickGroup=new THREE.Group();
  const tickCount=36;
  for(let i=0;i<tickCount;i++){
    const a=(i/tickCount)*Math.PI*2;
    const len=i%6===0?0.12:0.05;
    const tickGeo=new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(Math.cos(a)*radius,0,Math.sin(a)*radius),
      new THREE.Vector3(Math.cos(a)*(radius+len),0,Math.sin(a)*(radius+len))
    ]);
    const tick=new THREE.Line(tickGeo,
      new THREE.LineBasicMaterial({color:i%6===0?0x44ccdd:0x225566,transparent:true,opacity:0.5,depthWrite:false})
    );
    tickGroup.add(tick);
  }
  ring.add(tickGroup);
  phoneRoot.add(ring);
  hudRings.push({ring,radius,speed:0.15+Math.random()*0.2});
  return ring;
}
makeHUDRing(1.45,0.1,0,0x228899,0.45);
makeHUDRing(1.55,0.05,0.3,0x116677,0.35);
makeHUDRing(1.65,-0.05,-0.2,0x228899,0.3);
makeHUDRing(1.35,0.08,0.6,0x115566,0.4);

// ========== RADIAL GAUGES ==========
const gauges=[];
function makeGauge(x,y,z,r,color,label){
  const g=new THREE.Group();g.position.set(x,y,z);
  // Ring
  const ringGeo=new THREE.TorusGeometry(r,0.015,8,80,Math.PI*1.5);
  const ring=new THREE.Mesh(ringGeo,
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.6,depthWrite:false})
  );g.add(ring);
  // Indicator dot
  const dot=new THREE.Mesh(
    new THREE.SphereGeometry(0.04,8,8),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.9,depthWrite:false})
  );
  dot.position.set(Math.cos(0)*r,0,Math.sin(0)*r);
  dot.userData={angle:0,speed:0.5+Math.random()*0.5,r};
  g.add(dot);
  g.userData={dot,label,r,color};
  phoneRoot.add(g);
  gauges.push(g);
}
makeGauge(1.8,0.8,0,0.35,0x44ddff,'AI');
makeGauge(1.8,-0.3,0,0.3,0x5599cc,'CPU');
makeGauge(-1.8,0.6,0,0.32,0x9966cc,'GPU');
makeGauge(-1.8,-0.5,0,0.28,0x55aa88,'BAT');

// ========== DATA PANELS (8 in a circle) ==========
const panelDefs=[
  {p:[0,2.6,-3.2],r:[0.15,0,0],t:'SYSTEM OVERVIEW',l:['> Yphone OS v4.2.7','> Uptime: 847 days','✓ AI Core: OPTIMAL','✓ All modules: NOMINAL','  Active processes: 14','  Power draw: 3.2W']},
  {p:[3.2,1.5,-2.5],r:[0.1,-0.5,0.05],t:'CPU PERFORMANCE',l:['> Gen 8 Hexa-Core','> Clock: 3.8 GHz','✓ Temp: 42°C NORMAL','  Load: 23%','  IPC gain: +17%','! Pred. refresh: 2029']},
  {p:[3.5,-0.5,-2.2],r:[0.1,-0.6,-0.05],t:'GPU ANALYTICS',l:['> Gen 7 Octa-Core','> VRAM: 16 GB','✓ Throughput: OPTIMAL','  RT perf: +22%','  Power eff: 94%','✓ Driver: LATEST']},
  {p:[2.8,-2.0,-2.8],r:[0.15,-0.4,0],t:'BATTERY HEALTH',l:['> Capacity: 5200 mAh','> Cycles: 312','✓ Health: 91%','  Peak: 98%','  Est. life: 6.2 yr','! Replace: 2028-Q4']},
  {p:[-2.8,-2.0,-2.8],r:[0.15,0.4,0],t:'MEMORY & STORAGE',l:['> RAM: 12 TB Unified','> Storage: 2 TB','✓ Bandwidth: 840 GB/s','  Latency: 32 ns','  ECC errors: 0','✓ Wear level: 4%']},
  {p:[-3.5,-0.5,-2.2],r:[0.1,0.6,-0.05],t:'E-WASTE STATS',l:['> Prevented: 18.7 kg','> CO₂ avoided: 142 kg','✓ Circular index: 94%','  Modules reused: 6','  Lifetime: 4.2 yr','> Path: ON TRACK']},
  {p:[-3.2,1.5,-2.5],r:[0.1,0.5,0.05],t:'SECURITY STATUS',l:['> AEON-256 Encrypted','✓ No breaches detected','✓ Firewall: ACTIVE','  Last audit: 2h ago','  Threats blocked: 0','✓ Secure boot: OK']},
  {p:[0,-2.8,-3.5],r:[0.3,0,0],t:'UPDATE HISTORY',l:['> [14:32] GPU optimizer','✓ [14:28] Security patch','> [14:15] Battery profile','✓ [13:58] AI model sync','  [13:42] Sensor calib.','  [13:30] Network stack']},
];
const panels=[];
panelDefs.forEach(d=>{
  const tex=makePanelTex(d.t,d.l);
  const geo=new THREE.PlaneGeometry(2.0,1.0);
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide});
  const panel=new THREE.Mesh(geo,mat);
  panel.position.set(...d.p);panel.rotation.set(...d.r);
  panel.userData=d;scene.add(panel);panels.push(panel);
});

// ========== CONNECTION LINES (core→panels) ==========
const connLines=[];
panels.forEach(p=>{
  const pts=[new THREE.Vector3(0,0.25,0),p.position.clone()];
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const line=new THREE.Line(geo,
    new THREE.LineBasicMaterial({color:0x004455,transparent:true,opacity:0.2,depthWrite:false})
  );scene.add(line);connLines.push({line,panel:p});
});

// ========== PARTICLE SYSTEMS ==========
// Ambient dust
const ambCount=250;
const ambGeo=new THREE.BufferGeometry();
const ambPos=new Float32Array(ambCount*3);
for(let i=0;i<ambCount;i++){
  ambPos[i*3]=(Math.random()-0.5)*16;
  ambPos[i*3+1]=(Math.random()-0.5)*10;
  ambPos[i*3+2]=(Math.random()-0.5)*12;
}
ambGeo.setAttribute('position',new THREE.BufferAttribute(ambPos,3));
const ambPts=new THREE.Points(ambGeo,
  new THREE.PointsMaterial({color:0x337799,size:0.018,transparent:true,opacity:0.45,depthWrite:false,blending:THREE.AdditiveBlending})
);scene.add(ambPts);

// Core orbit particles
const orbCount=150;
const orbGeo=new THREE.BufferGeometry();
const orbPos=new Float32Array(orbCount*3);
const orbData=[];
for(let i=0;i<orbCount;i++){
  const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
  const r=0.4+Math.random()*2.5;
  orbPos[i*3]=r*Math.sin(phi)*Math.cos(theta);
  orbPos[i*3+1]=r*Math.sin(phi)*Math.sin(theta)+0.25;
  orbPos[i*3+2]=r*Math.cos(phi);
  orbData.push({theta,phi,r,speed:0.2+Math.random()*0.6,off:Math.random()*Math.PI*2});
}
orbGeo.setAttribute('position',new THREE.BufferAttribute(orbPos,3));
const orbPts=new THREE.Points(orbGeo,
  new THREE.PointsMaterial({color:0x44ccff,size:0.025,transparent:true,opacity:0.6,depthWrite:false,blending:THREE.AdditiveBlending})
);phoneRoot.add(orbPts);

// ========== SCANNING PLANE ==========
const scanGeo=new THREE.PlaneGeometry(PW*2.8,PH*2.8);
const scanMat=new THREE.MeshBasicMaterial({
  color:0x00aacc,transparent:true,opacity:0.06,depthWrite:false,side:THREE.DoubleSide
});
const scanPlane=new THREE.Mesh(scanGeo,scanMat);
scanPlane.rotation.x=-Math.PI/2;
scanPlane.userData={dir:1,y:-PH};
phoneRoot.add(scanPlane);
let scanActive=true;

// Scan grid lines on the plane
const scanGridLines=new THREE.Group();
for(let i=-6;i<=6;i++){
  const h=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(i*0.3,-PH*1.4,0.001),new THREE.Vector3(i*0.3,PH*1.4,0.001)
  ]);
  scanGridLines.add(new THREE.Line(h,
    new THREE.LineBasicMaterial({color:0x116688,transparent:true,opacity:0.25,depthWrite:false})
  ));
}
scanPlane.add(scanGridLines);

// ========== RAYCASTER INTERACTION ==========
const raycaster=new THREE.Raycaster();
raycaster.far=8;
const mouse=new THREE.Vector2();
let hoveredObj=null;
let focusedModule=null;

renderer.domElement.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
});

renderer.domElement.addEventListener('click',e=>{
  if(e.target.closest('.ctrl')||e.target.closest('.fp-close'))return;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(interactiveTargets,true);
  if(hits.length>0){
    let obj=hits[0].object;
    while(obj&&!interactiveTargets.includes(obj))obj=obj.parent;
    if(obj&&obj.userData.name){
      focusModule(obj);
    }
  }else{
    closeFocus();
  }
});

function focusModule(obj){
  focusedModule=obj;
  // Highlight
  interactiveTargets.forEach(t=>{
    t.children.forEach(c=>{
      if(c.isLineSegments)c.material.opacity=t===obj?1:0.3;
      if(c.isMesh&&c.material.color)c.material.opacity=t===obj?0.25:0.05;
    });
  });
  // Update focus panel
  const d=obj.userData;
  document.getElementById('fpTitle').textContent='MODULE DETAIL';
  document.getElementById('fpName').textContent=d.name;
  document.getElementById('fpRows').innerHTML=`
    <div class="fp-row"><span>Status</span><span class="val" style="color:#44ddaa">✓ OPTIMAL</span></div>
    <div class="fp-row"><span>Size</span><span class="val">${(d.w*10).toFixed(1)}×${(d.h*10).toFixed(1)} mm</span></div>
    <div class="fp-row"><span>Generation</span><span class="val">Gen ${Math.floor(Math.random()*5+5)}</span></div>
    <div class="fp-row"><span>Health</span><span class="val">${(85+Math.random()*15).toFixed(0)}%</span></div>
    <div class="fp-row"><span>Predicted Life</span><span class="val">${(3+Math.random()*8).toFixed(1)} years</span></div>
    <div class="fp-row"><span>Next Refresh</span><span class="val">20${27+Math.floor(Math.random()*5)}-Q${Math.floor(Math.random()*4+1)}</span></div>
  `;
  document.getElementById('focusPanel').classList.add('show');
  document.body.classList.add('pointing');
}

window.closeFocus=function(){
  focusedModule=null;
  interactiveTargets.forEach(t=>{
    t.children.forEach(c=>{
      if(c.isLineSegments)c.material.opacity=0.7;
      if(c.isMesh&&c.material.color)c.material.opacity=0.08;
    });
  });
  document.getElementById('focusPanel').classList.remove('show');
  document.body.classList.remove('pointing');
};

// ========== STATE ==========
let exploded=false,hudVisible=true;

function t(what){
  if(what==='orbit'){ctrl3d.autoRotate=!ctrl3d.autoRotate;document.getElementById('btnOrbit').classList.toggle('on',ctrl3d.autoRotate)}
  if(what==='explode'){exploded=!exploded;document.getElementById('btnExplode').classList.toggle('on',exploded)}
  if(what==='hud'){hudVisible=!hudVisible;document.getElementById('btnHUD').classList.toggle('on',hudVisible)}
  if(what==='scan'){scanActive=!scanActive;document.getElementById('btnScan').classList.toggle('on',scanActive)}
}
window.t=t;

window.resetAll=function(){
  const sp=camera.position.clone(),ep=new THREE.Vector3(4.5,2.5,9);
  const st=ctrl3d.target.clone(),et=new THREE.Vector3(0,0.4,0);
  const start=performance.now();
  (function anim(now){
    const p=Math.min((now-start)/800,1);
    const e=1-Math.pow(1-p,3);
    camera.position.lerpVectors(sp,ep,e);ctrl3d.target.lerpVectors(st,et,e);
    if(p<1)requestAnimationFrame(anim);
  })(start);
  exploded=false;hudVisible=true;scanActive=true;
  ['btnExplode','btnScan'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('btnHUD').classList.add('on');
  document.getElementById('btnOrbit').classList.add('on');
  ctrl3d.autoRotate=true;
  closeFocus();
};

window.shot=function(){
  renderer.render(scene,camera);
  const a=document.createElement('a');
  a.download='Yphone_JARVIS_'+Date.now()+'.png';
  a.href=renderer.domElement.toDataURL('image/png');a.click();
};

// Keyboard
addEventListener('keydown',e=>{
  switch(e.key.toLowerCase()){
    case'r':t('orbit');break;case'e':t('explode');break;
    case'h':t('hud');break;case's':if(!e.ctrlKey)shot();break;
    case'f':document.documentElement.requestFullscreen?.().catch(()=>{});break;
    case'0':resetAll();break;case'escape':closeFocus();break;
  }
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ========== ANIMATION ==========
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.1);
  const t=performance.now()*0.001;
  ctrl3d.update();

  // Hover detection
  if(!focusedModule){
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObjects(interactiveTargets,true);
    let newHover=null;
    if(hits.length>0){
      let obj=hits[0].object;
      while(obj&&!interactiveTargets.includes(obj))obj=obj.parent;
      if(obj&&obj.userData.name)newHover=obj;
    }
    if(hoveredObj!==newHover){
      // Reset old
      if(hoveredObj)hoveredObj.children.forEach(c=>{
        if(c.isLineSegments)c.material.opacity=0.7;
        if(c.isMesh&&c.material.color)c.material.opacity=0.08;
      });
      // Highlight new
      if(newHover){
        newHover.children.forEach(c=>{
          if(c.isLineSegments)c.material.opacity=1;
          if(c.isMesh&&c.material.color)c.material.opacity=0.18;
        });
        document.body.classList.add('pointing');
      }else{
        document.body.classList.remove('pointing');
      }
      hoveredObj=newHover;
    }
  }

  // Phone float
  phoneRoot.position.y=Math.sin(t*0.6)*0.15;
  phoneRoot.rotation.y+=dt*0.12;

  // HUD rings
  hudRings.forEach(({ring,speed})=>{ring.rotation.y+=dt*speed;ring.rotation.z+=dt*speed*0.4});
  hudRings.forEach(r=>r.ring.visible=hudVisible);

  // Gauges
  gauges.forEach(g=>{
    const dot=g.userData.dot;
    dot.userData.angle+=dt*dot.userData.speed;
    const a=dot.userData.angle,r=dot.userData.r;
    dot.position.set(Math.cos(a)*r,0,Math.sin(a)*r);
    g.visible=hudVisible;
  });

  // AI ring
  aiRing.rotation.z+=dt*1.2;aiRing.rotation.x+=dt*0.6;
  aiRing.position.copy(aiCore.position);

  // Explode modules
  interactiveTargets.forEach(m=>{
    const base=m.userData.basePos;
    const explodePos=base.clone().multiplyScalar(exploded?2.5:1);
    explodePos.z-=exploded?0.5:0;
    m.position.lerp(exploded?explodePos:base,dt*3.5);
  });

  // Scan plane
  if(scanActive){
    scanPlane.userData.y+=dt*1.8*scanPlane.userData.dir;
    if(scanPlane.userData.y>PH){scanPlane.userData.dir=-1;scanPlane.userData.y=PH}
    if(scanPlane.userData.y<-PH){scanPlane.userData.dir=1;scanPlane.userData.y=-PH}
    scanPlane.position.y=scanPlane.userData.y;
    scanMat.opacity=0.04+Math.abs(Math.sin(scanPlane.userData.y*2))*0.06;
  }
  scanPlane.visible=scanActive;

  // Panels
  panels.forEach((p,i)=>{
    const targetOpacity=hudVisible?1:0.05;
    p.material.opacity+=(targetOpacity-p.material.opacity)*dt*4;
    p.position.y=p.userData.p[1]+Math.sin(t*0.6+i)*0.12;
  });
  connLines.forEach(({line})=>{line.material.opacity=hudVisible?0.2:0.01});

  // Particles
  ambPts.rotation.y+=dt*0.03;
  const oArr=orbPts.geometry.attributes.position.array;
  for(let i=0;i<orbCount;i++){
    const d=orbData[i];d.theta+=dt*d.speed;
    const r=d.r+Math.sin(t+d.off)*0.2;
    oArr[i*3]=r*Math.sin(d.phi)*Math.cos(d.theta);
    oArr[i*3+1]=r*Math.sin(d.phi)*Math.sin(d.theta)+0.25;
    oArr[i*3+2]=r*Math.cos(d.phi);
  }
  orbPts.geometry.attributes.position.needsUpdate=true;

  // Live update feed (panel 7)
  if(hudVisible&&Math.floor(t)%4===0&&Math.floor(t)!==panels[7]?.userData._lu){
    const fp=panels[7];if(fp&&fp.userData){
      fp.userData._lu=Math.floor(t);
      const ts=new Date().toTimeString().slice(0,8);
      fp.material.map?.dispose();
      fp.material.map=makePanelTex('UPDATE HISTORY',[
        `> [${ts}] GPU optimizer v3`,`✓ [${ts}] Self-check OK`,
        `> [${ts}] Module sync done`,`✓ [${ts}] Cloud weights OK`,
        `  [${ts}] Routine scan`,'  [${ts}] Idle — nominal'
      ]);fp.material.needsUpdate=true;
    }
  }

  // Hide hint
  if(!hintHidden&&(Math.abs(ctrl3d.target.x)>0.1||Math.abs(ctrl3d.target.y-0.4)>0.1)){
    document.getElementById('hint').style.opacity='0';hintHidden=true;
  }
}
let hintHidden=false;

// Pulse accent light
const _origAnimate=animate;
const pulseLight=()=>{pl.intensity=7.5+Math.sin(performance.now()*0.003)*1.5;requestAnimationFrame(pulseLight)};
pulseLight();

animate();

// Loading
setTimeout(()=>{
  document.getElementById('load').classList.add('done');
  setTimeout(()=>document.getElementById('load').remove(),600);
},400);

console.log('%c⚡ YPHONE CORE %cJARVIS INTERFACE %c· %cBanana Company',
  'color:#00d4ff;font-weight:700;font-size:16px;','color:#557788;','','color:#0071e3;');
console.log('HOVER phone modules | CLICK to inspect | R=orbit E=explode H=HUD S=scan | 0=reset');
</script>
</body>
</html>
